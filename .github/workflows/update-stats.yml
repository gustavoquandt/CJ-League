name: Update CJ League Stats

on:
  schedule:
    # A cada 2 horas (horas pares: 00:00, 02:00, 04:00, etc)
    - cron: '0 */2 * * *'
  workflow_dispatch:  # Permite rodar manualmente

jobs:
  update-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Timeout de 30 minutos
    
    steps:
      - name: Update Season 1 (Batch)
        run: |
          echo "⚡ Iniciando atualização COMPLETA da Season 1..."
          
          response=$(curl -X POST \
            "https://www.statscj.com/api/admin/batch-update?season=SEASON_1" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_SECRET }}" \
            -H "Content-Type: application/json" \
            -w "\n%{http_code}" \
            -s)
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          
          echo "📊 Status Code: $http_code"
          echo "📋 Response:"
          echo "$body" | jq '.' || echo "$body"
          
          if [ "$http_code" != "200" ]; then
            echo "❌ Erro na atualização!"
            exit 1
          fi
          
          echo "✅ Season 1 atualizada com sucesso!"
      
      - name: Wait between seasons
        run: sleep 10
      
      - name: Update Season 0 (Batch)
        run: |
          echo "⚡ Iniciando atualização COMPLETA da Season 0..."
          
          response=$(curl -X POST \
            "https://www.statscj.com/api/admin/batch-update?season=SEASON_0" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_SECRET }}" \
            -H "Content-Type: application/json" \
            -w "\n%{http_code}" \
            -s)
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          
          echo "📊 Status Code: $http_code"
          echo "📋 Response:"
          echo "$body" | jq '.' || echo "$body"
          
          if [ "$http_code" != "200" ]; then
            echo "❌ Erro na atualização!"
            exit 1
          fi
          
          echo "✅ Season 0 atualizada com sucesso!"