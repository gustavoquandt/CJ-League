name: Update CJ Stats (Incremental)

on:
  schedule:
    # A cada 2 horas
    - cron: '0 */2 * * *'
  
  # Permite executar manualmente
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Apenas 10 minutos (incremental é rápido)
    
    steps:
      - name: Update Season 1 (Incremental)
        run: |
          echo "⚡ Iniciando atualização incremental da Season 1..."
          
          response=$(curl -X POST \
            "https://www.statscj.com/api/admin/update-incremental?season=SEASON_1" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_SECRET }}" \
            -H "Content-Type: application/json" \
            -w "\n%{http_code}" \
            -s)
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          
          echo "📊 Status Code: $http_code"
          echo "📋 Response:"
          echo "$body" | jq '.' || echo "$body"
          
          if [ "$http_code" != "200" ]; then
            echo "❌ Erro na atualização!"
            exit 1
          fi
          
          echo "✅ Season 1 atualizada incrementalmente!"
      
      - name: Send notification on failure
        if: failure()
        run: |
          echo "❌ Atualização falhou! Verifique os logs."