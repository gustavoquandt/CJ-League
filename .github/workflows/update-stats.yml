name: Update CJ League Stats (Incremental)

on:
  schedule:
    # A cada 2 horas (horas pares: 00:00, 02:00, 04:00, etc)
    - cron: '0 */2 * * *'
  workflow_dispatch:  # Permite rodar manualmente

jobs:
  update-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Check for new matches
        id: check
        run: |
          echo "🔍 Verificando partidas novas..."
          
          response=$(curl -s \
            "https://www.statscj.com/api/admin/check-new-matches?season=SEASON_1")
          
          echo "📋 Response:"
          echo "$response" | jq '.'
          
          # Extrair hasNewMatches
          hasNew=$(echo "$response" | jq -r '.hasNewMatches')
          playerCount=$(echo "$response" | jq -r '.playerIds | length // 0')
          matchCount=$(echo "$response" | jq -r '.newMatchesCount // 0')
          
          echo "hasNew=$hasNew" >> $GITHUB_OUTPUT
          echo "playerCount=$playerCount" >> $GITHUB_OUTPUT
          echo "matchCount=$matchCount" >> $GITHUB_OUTPUT
          echo "checkResponse<<EOF" >> $GITHUB_OUTPUT
          echo "$response" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          if [ "$hasNew" = "true" ]; then
            echo "✅ $matchCount partidas novas com $playerCount jogadores"
          else
            echo "✅ Nenhuma partida nova"
          fi
      
      - name: Process incremental update
        if: steps.check.outputs.hasNew == 'true'
        run: |
          echo "⚡ Processando ${{ steps.check.outputs.playerCount }} jogadores..."
          
          response=$(curl -X POST \
            "https://www.statscj.com/api/admin/process-incremental" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '${{ steps.check.outputs.checkResponse }}' \
            -w "\n%{http_code}" \
            -s)
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          
          echo "📊 Status Code: $http_code"
          echo "📋 Response:"
          echo "$body" | jq '.' || echo "$body"
          
          if [ "$http_code" != "200" ]; then
            echo "❌ Erro ao processar!"
            exit 1
          fi
          
          echo "✅ Atualização incremental concluída!"
      
      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.hasNew }}" = "true" ]; then
            echo "📊 Resumo:"
            echo "   • ${{ steps.check.outputs.matchCount }} partidas novas"
            echo "   • ${{ steps.check.outputs.playerCount }} jogadores atualizados"
            echo "   • ✅ Incremental executado"
          else
            echo "✅ Nenhuma atualização necessária"
          fi