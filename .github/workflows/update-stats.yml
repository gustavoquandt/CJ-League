name: Update CJ Stats

on:
  schedule:
    # 05:00 UTC = 02:00 AM Brasília
    - cron: '0 5 * * *'
  
  # Permite executar manualmente
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # 60 minutos de timeout
    
    steps:
      - name: Update Season 1 Stats
        run: |
          echo "🚀 Iniciando atualização da Season 1..."
          
          response=$(curl -X POST \
            "https://www.statscj.com/api/admin/update-all?season=SEASON_1" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_SECRET }}" \
            -H "Content-Type: application/json" \
            -w "\n%{http_code}" \
            -s)
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          
          echo "📊 Status Code: $http_code"
          echo "📋 Response:"
          echo "$body" | jq '.' || echo "$body"
          
          if [ "$http_code" != "200" ]; then
            echo "❌ Erro na atualização!"
            exit 1
          fi
          
          echo "✅ Season 1 atualizada com sucesso!"
      
      - name: Send notification on failure
        if: failure()
        run: |
          echo "❌ Atualização falhou! Verifique os logs."
          # Opcional: Adicionar notificação por email/Slack aqui