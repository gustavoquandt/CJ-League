name: Update CJ League Stats (Incremental)

on:
  schedule:
    # A cada 2 horas (horas pares: 00:00, 02:00, 04:00, etc)
    - cron: '0 */2 * * *'
  workflow_dispatch:  # Permite rodar manualmente

jobs:
  update-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Run incremental update
        run: |
          echo "⚡ Iniciando atualização incremental..."

          response=$(curl -X POST \
            "https://www.statscj.com/api/admin/update-incremental?season=SEASON_1" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_SECRET }}" \
            -H "Content-Type: application/json" \
            -w "\n%{http_code}" \
            -s)

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "📋 Status: $http_code"
          echo "$body" | jq '.' || echo "$body"

          if [ "$http_code" != "200" ]; then
            echo "❌ Erro na atualização!"
            exit 1
          fi

          new_matches=$(echo "$body" | jq -r '.newMatches // 0')
          players_updated=$(echo "$body" | jq -r '.playersUpdated // 0')
          duration=$(echo "$body" | jq -r '.duration // "?"')

          echo ""
          echo "🎉 ========================================="
          echo "✅ INCREMENTAL FINALIZADO!"
          echo "🎮 Partidas novas: $new_matches"
          echo "👥 Jogadores atualizados: $players_updated"
          echo "⏱️  Duração: $duration"
          echo "🎉 ========================================="